# ─────────────────────────────────────────────────────────────
# NBA Pipeline — GitHub Actions
# ─────────────────────────────────────────────────────────────
# Two jobs:
#
#   1. current  — runs "current" mode every 30 min from 6–10 AM PT:
#                   6:00 AM PT  (14:00 UTC) — earliest attempt
#                   6:30 AM PT  (14:30 UTC)
#                   7:00 AM PT  (15:00 UTC)
#                   ... every 30 min ...
#                   10:00 AM PT (18:00 UTC) — latest attempt
#
#                 predict.py skips games that already have predictions,
#                 so only the first successful run writes predictions.
#                 No runs after 10 AM PT to avoid overwriting pregame
#                 predictions with live/final game data.
#
#   2. historical — manual-only, full rebuild from scratch
#
# To ENABLE:  Go to Actions tab → "NBA Pipeline" → Enable workflow
# To DISABLE: Go to Actions tab → "NBA Pipeline" → "..." → Disable workflow
# ─────────────────────────────────────────────────────────────

name: NBA Pipeline

on:
  schedule:
    # Every 30 min from 6 AM–10 AM PT (14:00–18:00 UTC)
    # First run that finds complete NBA API data produces predictions.
    - cron: "0,30 14-17 * * *"
    - cron: "0 18 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode to run"
        required: true
        default: "current"
        type: choice
        options:
          - current
          - historical

# Only one pipeline run at a time (cancel older if new one starts)
concurrency:
  group: nba-pipeline
  cancel-in-progress: true

jobs:
  # ─── Scheduled Updates (every 30 min, 6–10 AM PT) ──────────
  current:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: nba-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r nba-pipeline/requirements.txt

      - name: Run current pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python nba-pipeline/run_pipeline.py current

  # ─── Manual Trigger ─────────────────────────────────────────
  manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: nba-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r nba-pipeline/requirements.txt

      - name: Run ${{ inputs.mode }} pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python nba-pipeline/run_pipeline.py ${{ inputs.mode }}
