# ─────────────────────────────────────────────────────────────
# MLB Autopilot — GitHub Actions
# ─────────────────────────────────────────────────────────────
# Long-running live prediction loop for MLB games.
#
# Triggers every 15 min during the MLB game window:
#   11:00 AM – 1:00 AM ET  (15:00–05:00 UTC)
#
# MLB games start as early as 11:30 AM ET (day games) and
# west-coast night games can end past midnight ET.
#
# Safe to trigger frequently because:
#   - cancel-in-progress: false → won't kill a running instance
#   - GitHub queues at most 1 pending run per concurrency group
#   - The loop auto-exits after 15 min with no active games
#   - timeout-minutes: 360 (6 hours) covers a full game slate
#
# To ENABLE:  Go to Actions tab → "MLB Autopilot" → Enable workflow
# To DISABLE: Go to Actions tab → "MLB Autopilot" → "..." → Disable workflow
# ─────────────────────────────────────────────────────────────

name: MLB Autopilot

on:
  schedule:
    # Every 15 min, 3 PM – 11:45 PM UTC (11 AM – 7:45 PM ET)
    - cron: "*/15 15-23 * * *"
    # Every 15 min, 12 AM – 5 AM UTC (8 PM – 1 AM ET)
    - cron: "*/15 0-5 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Only one MLB autopilot run at a time.
# Separate concurrency group from NBA autopilot.
concurrency:
  group: autopilot-mlb
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: autopilot/requirements.txt

      - name: Install dependencies
        run: pip install -r autopilot/requirements.txt

      - name: Run MLB autopilot live loop
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python autopilot/run_mlb_live.py
