<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Abstract upward chart/edge arrow with E shape -->
  <rect width="256" height="256" rx="48" fill="#0a0a0a"/>
  <g fill="#e5e5e5">
    <!-- Vertical bar -->
    <rect x="52" y="44" width="18" height="168" rx="4"/>
    <!-- Three bars getting progressively longer (ascending edge visual) -->
    <rect x="82" y="44" width="72" height="18" rx="4"/>
    <rect x="82" y="119" width="92" height="18" rx="4"/>
    <rect x="82" y="194" width="120" height="18" rx="4"/>
    <!-- Arrow tip on bottom bar -->
    <polygon points="202,203 218,203 210,190"/>
  </g>
</svg>
